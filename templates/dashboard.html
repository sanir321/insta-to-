<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstaToYT Automation Agent</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #080a0f;
            --bg-card: rgba(16, 20, 28, 0.7);
            --border: rgba(255, 255, 255, 0.08);
            --primary: #00f2ff;
            --primary-glow: rgba(0, 242, 255, 0.3);
            --secondary: #7000ff;
            --text-main: #e2e8f0;
            --text-dim: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-deep);
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(112, 0, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(0, 242, 255, 0.05) 0%, transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
            line-height: 1.5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }

        .brand h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .brand p {
            color: var(--text-dim);
            font-weight: 300;
            margin-top: 0.25rem;
        }

        .status-pill {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 0.6rem 1.2rem;
            border-radius: 100px;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.9rem;
            font-weight: 600;
            backdrop-filter: blur(10px);
        }

        .pulse {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--text-dim);
        }

        .pulse.active {
            background: var(--success);
            box-shadow: 0 0 12px var(--success);
            animation: pulse-anim 2s infinite;
        }

        @keyframes pulse-anim {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 1.5rem;
            backdrop-filter: blur(12px);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .metrics-card .label {
            color: var(--text-dim);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            display: block;
        }

        .metrics-card .value {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 900px) {
            .main-layout { grid-template-columns: 1fr; }
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .progress-box {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            justify-content: center;
            height: 100%;
        }

        .step-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.75rem;
            font-size: 0.95rem;
        }

        .progress-bar-container {
            width: 100%;
            height: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 100px;
            overflow: hidden;
            position: relative;
        }

        #progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            width: 0%;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .log-container {
            height: 400px;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        .log-container::-webkit-scrollbar { width: 4px; }
        .log-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .log-item {
            padding: 0.75rem 1rem;
            border-left: 2px solid var(--border);
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-dim);
            transition: all 0.2s ease;
        }

        .log-item:hover {
            border-left-color: var(--primary);
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.02);
        }

        .log-item.highlight {
            border-left-color: var(--success);
            color: var(--text-main);
        }

        .footer {
            margin-top: 4rem;
            text-align: center;
            color: var(--text-dim);
            font-size: 0.8rem;
            opacity: 0.5;
        }

        .url-display {
            font-family: monospace;
            font-size: 0.75rem;
            color: var(--text-dim);
            background: rgba(0,0,0,0.2);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="brand">
                <h1>InstaToYT Agent</h1>
                <p>Automated Instagram Reels to YouTube Shorts Pipeline</p>
            </div>
            <div class="status-pill">
                <div id="status-pulse" class="pulse"></div>
                <span id="status-text">Connecting...</span>
            </div>
        </header>

        <div class="metrics-grid">
            <div class="card metrics-card">
                <span class="label">Total Successful Posts</span>
                <div id="total-uploads" class="value">0</div>
            </div>
            <div class="card metrics-card">
                <span class="label">Last Activity</span>
                <div id="last-upload-time" class="value">Never</div>
            </div>
            <div class="card metrics-card">
                <span class="label">Current Status</span>
                <div id="current-action" class="value" style="color: var(--primary); font-size: 1.4rem;">Initializing...</div>
            </div>
        </div>

        <div class="main-layout">
            <div class="card">
                <div class="section-title">
                    <span>Live Pipeline</span>
                    <span id="active-url" class="url-display">None</span>
                </div>
                <div class="progress-box">
                    <div>
                        <div class="step-info">
                            <span id="step-name" style="color: var(--text-dim)">Initializing...</span>
                            <span id="progress-percent" style="font-weight: 700; color: var(--primary);">0%</span>
                        </div>
                        <div class="progress-bar-container">
                            <div id="progress-bar"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="section-title">Execution Logs</div>
                <div id="log-container" class="log-container">
                    <div class="log-item">Waiting for logs...</div>
                </div>
            </div>
        </div>

        <div class="footer">
            &copy; 2026 InstaToYTAgent • Powered by FastAPI & Gemini
        </div>
    </div>

    <script>
        async function fetchStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();

                // Status Badge
                const pulse = document.getElementById('status-pulse');
                const stext = document.getElementById('status-text');
                if (data.is_running) {
                    pulse.classList.add('active');
                    stext.innerText = 'System Active';
                    stext.style.color = 'var(--success)';
                } else {
                    pulse.classList.remove('active');
                    stext.innerText = data.current_action === 'Sleeping' ? 'System Resting' : 'System Idle';
                    stext.style.color = 'var(--warning)';
                }

                // Metrics
                document.getElementById('total-uploads').innerText = data.total_uploads;
                document.getElementById('last-upload-time').innerText = data.last_upload_time;
                document.getElementById('current-action').innerText = data.current_action;

                // Progress
                document.getElementById('step-name').innerText = data.step_name;
                document.getElementById('progress-percent').innerText = data.progress + '%';
                document.getElementById('progress-bar').style.width = data.progress + '%';
                document.getElementById('active-url').innerText = data.active_url;

                // Logs
                const logBox = document.getElementById('log-container');
                logBox.innerHTML = '';
                [...data.logs].reverse().forEach(log => {
                    const div = document.createElement('div');
                    div.className = 'log-item' + (log.includes('✅') ? ' highlight' : '');
                    div.innerText = log;
                    logBox.appendChild(div);
                });

            } catch (err) {
                console.error('Failed to fetch status:', err);
            }
        }

        setInterval(fetchStatus, 2000);
        fetchStatus();
    </script>
</body>
</html>
